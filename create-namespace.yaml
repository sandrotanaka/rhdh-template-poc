apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: poc-openshift-project
  title: Criar projeto OpenShift (PoC)
spec:
  owner: group:default/platform-team
  type: service

  parameters:
    - title: Dados
      required:
        - projectName
      properties:
        projectName:
          title: Nome do projeto
          type: string
          pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'

  steps:
    - id: fetch-base
      name: Gerar manifesto
      action: fetch:template
      input:
        url: ./skeleton
        values:
          projectName: ${{ parameters.projectName }}

    - id: publish
      name: Criar PR no GitOps
      action: publish:github:pull-request
      input:
        repoUrl: github.com?owner=sandrotanaka&repo=devhub-demo
        branchName: create-${{ parameters.projectName }}
        title: create project ${{ parameters.projectName }}
        description: Cria namespace ${{ parameters.projectName }} via GitOps
